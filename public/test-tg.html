<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer-when-downgrade">
</head>
<body style="margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; background: transparent; overflow: hidden;">
    
    <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="TurkDunyasiSinavBot" 
            data-size="large" 
            data-radius="15"
            data-userpic="false"
            data-onauth="onTelegramAuth(user)"></script>
            
    <script type="text/javascript">
      function onTelegramAuth(user) {
        // İframe içinden ana sayfaya (Next.js'e) kullanıcı bilgisini yolla
        window.parent.postMessage({ type: 'TELEGRAM_AUTH', user: user }, '*');
      }
    </script>
</body>
</html>
